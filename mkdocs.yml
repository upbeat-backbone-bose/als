site_name: ALS 文档中心
site_description: Another Looking-glass Server - 完整项目文档
site_url: https://upbeat-backbone-bose.github.io/als/
repo_url: https://github.com/upbeat-backbone-bose/als
repo_name: upbeat-backbone-bose/als

theme:
  name: material
  language: zh

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences

nav:
  - "首页": README.md
  - "核心文档":
    - "系统架构": ARCHITECTURE.md
    - "接口文档": INTERFACES.md
    - "开发者指南": DEVELOPER_GUIDE.md
  - "专有概念":
    - "会话机制": 专有概念/会话机制.md
    - "功能开关": 专有概念/功能开关.md
    - "控制台": 专有概念/控制台.md
  - "模块文档":
    - "后端核心": 模块/backend.md
    - "前端模块": 模块/ui.md
    - "配置模块": 模块/config.md
    - "FakeShell": 模块/fakeshell.md
