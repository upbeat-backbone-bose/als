site_name: ALS 文档中心
site_description: Another Looking-glass Server - 完整项目文档
site_url: https://upbeat-backbone-bose.github.io/als/
repo_url: https://github.com/upbeat-backbone-bose/als
repo_name: upbeat-backbone-bose/als

theme:
  name: material
  language: zh

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences

nav:
  - "首页": index.md
  - "核心文档":
    - "系统架构": architecture.md
    - "接口文档": interfaces.md
    - "开发者指南": developer-guide.md
    - "部署指南": deployment-guide.md
    - "Actions 保留策略": actions-retention.md
  - "专有概念":
    - "会话机制": session.md
    - "功能开关": feature-flags.md
    - "控制台": fake-shell.md
  - "模块文档":
    - "后端核心": backend.md
    - "前端模块": ui.md
    - "配置模块": config.md
    - "FakeShell": fakeshell.md
