version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - gocritic
    - prealloc
    - copyloopvar
    - nilerr
    - durationcheck
    - errorlint
    - exhaustive
    - goprintffuncname
    - makezero
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable:
        - shadow
        - nilness
        - unusedwrite
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
          - noctx
      # fakeshell drives an interactive shell whose subprocess return
      # values are intentionally ignored: the call site owns its own
      # error contract. Restrict the exclusion to errcheck only so other
      # linters still inspect the package.
      - path: fakeshell/
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
