name: 'Build UI'

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        default: '22'
    outputs:
      ui-archive:
        description: 'Path to the UI build artifact'
        value: ${{ steps.archive.outputs.ui-path }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ui
      - name: Build UI
        run: npm run build
        working-directory: ./ui
      - name: Create archive
        id: archive
        run: |
          tar -czf ui.tar.gz -C ui dist
          echo "ui-path=$(pwd)/ui.tar.gz" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui.tar.gz
          retention-days: 5
