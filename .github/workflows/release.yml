name: 'Build with release'

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ui
      - name: Build UI
        run: npm run build
        working-directory: ./ui
      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 5

  build-binary:
    runs-on: ubuntu-latest
    needs: build-ui
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'
      - name: Download UI artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: backend/embed/ui
      - name: Tidy Go modules
        run: go mod tidy
        working-directory: ./backend
      - name: Install UPX
        if: matrix.goos == 'linux'
        run: |
          UPX_VERSION=$(curl -sL https://api.github.com/repos/upx/upx/releases/latest | grep '"tag_name"' | sed 's/.*v\([0-9.]*\).*/\1/')
          wget -q https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz -O /tmp/upx.tar.xz
          tar -xf /tmp/upx.tar.xz -C /tmp
          sudo cp /tmp/upx-*/upx /usr/local/bin/
          upx --version
        shell: bash
      - name: Build binary
        working-directory: ./backend
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -ldflags="-s -w" -o als-${{ matrix.goos }}-${{ matrix.goarch }}${ext}
      - name: Generate checksum
        working-directory: ./backend
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          sha256sum als-${{ matrix.goos }}-${{ matrix.goarch }}${ext} > als-${{ matrix.goos }}-${{ matrix.goarch }}${ext}.sha256
      - name: Compress with UPX
        if: matrix.goos == 'linux'
        run: |
          which upx && upx -9 backend/als-linux-${{ matrix.goarch }} || echo "UPX compression skipped"
        shell: bash
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            backend/als-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
            backend/als-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
