name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-ui:
    uses: ./.github/workflows/shared/build-ui.yml

  backend:
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"
      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui_dist
      - name: Extract UI
        run: tar -xzf ui_dist/ui.tar.gz && mv dist backend/embed/ui
      - name: Verify UI files exist
        run: test -d backend/embed/ui && test -f backend/embed/ui/index.html
      - name: Test backend
        run: go test ./...
        working-directory: ./backend
      - name: Build backend
        run: go build -v ./...
        working-directory: ./backend
