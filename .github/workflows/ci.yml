name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ui
      - name: Run linter
        run: npm run lint
        working-directory: ./ui
      - name: Run tests
        run: npm test
        working-directory: ./ui
      - name: Build UI
        run: npm run build
        working-directory: ./ui
      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 5

  backend:
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"
      - name: Download UI artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: backend/embed/ui
      - name: Verify UI files exist
        run: test -d backend/embed/ui && test -f backend/embed/ui/index.html
      - name: Test backend
        run: |
          set -euo pipefail
          go vet ./...
          go test -race -count=1 -timeout 120s ./...
        working-directory: ./backend
      - name: Coverage
        run: |
          set -euo pipefail
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tee coverage.txt
          # Fail the job if total coverage drops below the agreed threshold.
          # Threshold was raised from 15% -> 52% alongside the coverage
          # push to 53.6% on 260623-fix-session-config-disclosure. Bump
          # this number as new commits raise coverage further.
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          awk -v t="$total" 'BEGIN { if (t+0 < 52) { printf "coverage %.2f%% below 52%% threshold\n", t; exit 1 } }'
        working-directory: ./backend
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7
      - name: Build backend
        run: go build -v ./...
        working-directory: ./backend

  # Static analysis: enforces the rules in backend/.golangci.yml
  # (errcheck, govet, staticcheck, gocritic, etc.). Runs in parallel
  # with the backend build/test job so a lint failure surfaces on its
  # own line in the PR check status instead of being hidden behind a
  # test failure. Independent of build-ui so lints stay green even
  # when the UI artifact is not yet ready.
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Install golangci-lint
        # Pin to v2.11.4: v2.4.0 was built with go1.25 and refuses
        # to lint projects whose go.mod requires go1.26+. v2.11.4
        # is built with go1.26.1 and works against the current
        # go.mod (go 1.26.4). v2.12.x ships but its install.sh
        # currently has a stale hash entry that fails signature
        # verification; track golangci-lint releases and bump
        # when v2.12.x is repaired upstream.
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
      - name: gofmt check
        # Fail if any .go file is not gofmt-clean.
        run: |
          set -euo pipefail
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::The following files are not gofmt-clean:"
            gofmt -l .
            exit 1
          fi
        working-directory: ./backend
      - name: goimports check
        run: |
          set -euo pipefail
          if [ -n "$(goimports -l .)" ]; then
            echo "::error::The following files are not goimports-clean:"
            goimports -l .
            exit 1
          fi
        working-directory: ./backend
      - name: staticcheck
        run: staticcheck ./...
        working-directory: ./backend
      - name: golangci-lint
        # .golangci.yml is v2 format. --timeout is generous: the
        # linter can spend several seconds on gocritic per file.
        run: golangci-lint run --timeout 5m ./...
        working-directory: ./backend
