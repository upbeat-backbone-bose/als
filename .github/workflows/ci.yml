name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ui
      - name: Run linter
        run: npm run lint
        working-directory: ./ui
      - name: Run tests
        run: npm test
        working-directory: ./ui
      - name: Build UI
        run: npm run build
        working-directory: ./ui
      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 5

  backend:
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: "backend/go.mod"
          cache-dependency-path: "backend/go.sum"
      - name: Download UI artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: backend/embed/ui
      - name: Verify UI files exist
        run: test -d backend/embed/ui && test -f backend/embed/ui/index.html
      - name: Test backend
        run: |
          set -euo pipefail
          go vet ./...
          go test -race -count=1 -timeout 120s ./...
        working-directory: ./backend
      - name: Coverage
        run: |
          set -euo pipefail
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tee coverage.txt
          # Fail the job if total coverage drops below the agreed threshold.
          # Threshold was raised from 15% -> 52% alongside the coverage
          # push to 53.6% on 260623-fix-session-config-disclosure. Bump
          # this number as new commits raise coverage further.
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          awk -v t="$total" 'BEGIN { if (t+0 < 52) { printf "coverage %.2f%% below 52%% threshold\n", t; exit 1 } }'
        working-directory: ./backend
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7
      - name: Build backend
        run: go build -v ./...
        working-directory: ./backend
