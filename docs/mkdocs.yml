site_name: ALS 文档中心
site_description: Another Looking-glass Server - 完整项目文档
site_author: upbeat-backbone-bose
repo_url: https://github.com/upbeat-backbone-bose/als
repo_name: upbeat-backbone-bose/als

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换到深色模式
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: 切换到浅色模式

nav:
  - 首页: README.md
  - 核心文档:
    - 系统架构: ARCHITECTURE.md
    - 接口文档: INTERFACES.md
    - 开发者指南: DEVELOPER_GUIDE.md
  - 专有概念:
    - 会话机制: 专有概念/会话机制.md
    - 功能开关: 专有概念/功能开关.md
    - 控制台：专有概念/控制台.md
  - 模块文档:
    - 后端核心：模块/backend.md
    - 前端模块：模块/ui.md
    - 配置模块：模块/config.md
    - FakeShell: 模块/fakeshell.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  # 添加文档部署 URL
  site_url: https://upbeat-backbone-bose.github.io/als/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/upbeat-backbone-bose/als
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/ryachueng/looking-glass-server
